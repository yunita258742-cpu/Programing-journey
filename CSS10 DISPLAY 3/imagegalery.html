<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.gallery{
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        div.gallery-item{
            margin: 5px;
            border: 1px solid #ccc;
            width: 100px;
        }
        div.gallery-item:hover{
            border: 1px solid #777;
        }
        div.gallery-item img{
            width: 100px;
            height: auto;
        }
        div.gallery-item div.dexc{
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Image Galery</h2>

    <div class="gallery">
    
    <div class="gallery-item">
        <a target="_blank" href="img_5terre.jpg.jpeg">
            <img src="img_5terre.jpg.jpeg" alt="Cinque Terre" width="600" height="400">
        </a>
        <div class="desc">Cinque Terre</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="img_forest.jpg.jpeg">
            <img src="img_forest.jpg.jpeg" alt="Forest" width="600" height="400">
        </a>
        <div class="desc">Green Forest</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="img_lights.jpg.jpeg">
            <img src="img_lights.jpg.jpeg" alt="Northern Lights" width="600" height="400">
        </a>
        <div class="desc">Northern Lights</div>
    </div>

    <div class="gallery-item">
        <a target="_blank" href="img_mountains.jpg.jpeg">
            <img src="img_mountains.jpg.jpeg" alt="Mountains" width="600" height="400">
        </a>
        <div class="desc">Mountains</div>
    </div>
</body>
</html>
